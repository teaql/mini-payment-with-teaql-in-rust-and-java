version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: agent -dev -client=0.0.0.0 -config-dir=/consul/config
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  merchant_db:
    image: postgres:15-alpine
    container_name: merchant_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=merchant_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment_db:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  spring-cloud-merchant-service:
    image: teaql/spring-cloud-merchant-service:latest
    container_name: spring-cloud-merchant-service
    build:
      context: ./spring-cloud-merchant-service
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://merchant_db:5432/merchant_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - CONSUL_HOST=consul
    ports:
      - "8081:8081"
    depends_on:
      consul:
        condition: service_healthy
      merchant_db:
        condition: service_healthy

  axum-payment-service:
    image: teaql/axum-payment-service:latest
    container_name: axum-payment-service
    build:
      context: ./axum-payment-service
      dockerfile: Dockerfile
    environment:
      - PAYMENT_SERVICE_CORE_DATABASE_URL=host=payment_db dbname=payment_db user=postgres password=postgres
      - PAYMENT_SERVICE_CORE_DATABASE_USER=postgres
      - PAYMENT_SERVICE_CORE_DATABASE_PASSWORD=postgres
      - SCHEMA_MODE=execute
      - CONSUL_HOST=http://consul:8500
      - POD_IP=axum-payment-service
    ports:
      - "8080:8080"
    depends_on:
      consul:
        condition: service_healthy
      payment_db:
        condition: service_healthy
