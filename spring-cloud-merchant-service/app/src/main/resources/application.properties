# Server Port Configuration
server.port=8081

# Database Configuration (merchant_db)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/merchant_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring Application Name
spring.application.name=merchant-service-java

# Nacos Discovery Configuration
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.namespace=public

# Target Rust Payment Service Endpoint for Outbox Sync via Nacos Discovery Service Name
payment.service.rust.url=http://payment-service-rust/api/internal/sync-merchant

# Scheduling & Async Task Execution
spring.main.allow-bean-definition-overriding=true
spring.task.scheduling.pool.size=2
spring.task.execution.pool.core-size=5
